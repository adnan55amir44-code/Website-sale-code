<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevStore | Source Codes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: rgba(20, 20, 20, 0.7);
            --primary: #00ff00;
            --primary-glow: 0 0 10px rgba(0, 255, 0, 0.4), 0 0 20px rgba(0, 255, 0, 0.2);
            --text: #ffffff;
            --text-muted: #999999;
            --glass-border: rgba(0, 255, 0, 0.15);
            --font: 'Poppins', sans-serif;
        }

        body.light-mode {
            --bg: #f4f4f4;
            --surface: #ffffff;
            --primary: #00cc00;
            --primary-glow: 0 0 10px rgba(0, 204, 0, 0.3);
            --text: #111111;
            --text-muted: #666666;
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at top right, rgba(0,255,0,0.05), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(0,255,0,0.05), transparent 40%),
                        var(--bg);
            background-attachment: fixed;
            color: var(--text);
            transition: all 0.3s ease;
        }

        /* App Header */
        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: var(--surface);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 20px;
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .top-bar h1 { font-size: 22px; font-weight: 700; color: var(--primary); text-shadow: var(--primary-glow); }
        .theme-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }

        /* Search & Categories */
        .search-container { position: relative; margin-bottom: 15px; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-container input {
            width: 100%; padding: 12px 15px 12px 45px;
            border-radius: 25px; border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.2); color: var(--text); font-size: 14px; outline: none;
            transition: all 0.3s;
        }
        .search-container input:focus { border-color: var(--primary); box-shadow: var(--primary-glow); }
        
        .categories { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-chip {
            padding: 8px 18px; border-radius: 20px; border: 1px solid var(--glass-border);
            background: var(--surface); color: var(--text); white-space: nowrap; cursor: pointer;
            transition: all 0.2s ease; font-size: 13px; font-weight: 500;
        }
        .cat-chip.active { background: var(--primary); color: #000; box-shadow: var(--primary-glow); border-color: var(--primary); }

        /* Product Grid */
        .main-content { padding: 20px; min-height: 80vh; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        
        .card {
            background: var(--surface); border: 1px solid var(--glass-border); border-radius: 16px;
            overflow: hidden; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; backdrop-filter: blur(10px);
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--primary-glow); }
        .card-img { width: 100%; height: 120px; object-fit: cover; }
        .card-body { padding: 12px; }
        .card-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-price { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; }
        .price-free { background: rgba(0,255,0,0.1); color: var(--primary); }
        .price-paid { background: rgba(255,165,0,0.1); color: orange; }

        /* Loader */
        .loader {
            border: 3px solid var(--glass-border); border-top: 3px solid var(--primary);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
            margin: 50px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Bottom Sheet Modal */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(5px); }
        .overlay.active { opacity: 1; pointer-events: all; }
        .modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh;
            background: var(--bg); z-index: 1000; border-top-left-radius: 24px; border-top-right-radius: 24px;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 25px 20px; overflow-y: auto;
            border-top: 1px solid var(--primary); box-shadow: 0 -5px 30px rgba(0,255,0,0.1);
        }
        .modal.active { bottom: 0; }
        .modal-drag { width: 40px; height: 5px; background: var(--text-muted); border-radius: 5px; margin: -10px auto 20px auto; }
        
        .modal-img { width: 100%; height: 200px; border-radius: 16px; object-fit: cover; margin-bottom: 15px; border: 1px solid var(--glass-border); }
        .modal-title { font-size: 22px; margin-bottom: 10px; }
        .modal-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: #000; box-shadow: var(--primary-glow); }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn:active { transform: scale(0.95); }

        /* Checkout Forms */
        .payment-card { background: rgba(0,255,0,0.05); border: 1px solid var(--primary); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .payment-card h3 { font-size: 16px; margin-bottom: 10px; color: var(--primary); }
        .payment-card p { font-size: 13px; margin-bottom: 5px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 12px; border-radius: 10px; background: var(--surface); border: 1px solid var(--glass-border); color: var(--text); outline: none; }
        .form-group input:focus { border-color: var(--primary); }
        
        @media(min-width: 768px) {
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
            .modal { width: 500px; left: 50%; transform: translateX(-50%); height: 90vh; border-radius: 24px; bottom: -100%; top: auto; }
            .modal.active { bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="top-bar">
            <h1>DevStore <i class="fas fa-code"></i></h1>
            <button class="theme-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="themeIcon"></i></button>
        </div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search apps, games, websites...">
        </div>
        <div class="categories" id="categoryContainer">
            <div class="cat-chip active" onclick="filterCategory('All', this)">All</div>
            <div class="cat-chip" onclick="filterCategory('Apps', this)">Apps</div>
            <div class="cat-chip" onclick="filterCategory('Games', this)">Games</div>
            <div class="cat-chip" onclick="filterCategory('Websites', this)">Websites</div>
        </div>
    </div>

    <div class="main-content">
        <div id="loader" class="loader"></div>
        <div class="product-grid" id="productGrid"></div>
    </div>

    <!-- Product Details Modal -->
    <div class="overlay" id="overlay" onclick="closeModals()"></div>
    <div class="modal" id="productModal">
        <div class="modal-drag"></div>
        <img src="" id="modImg" class="modal-img">
        <h2 id="modTitle" class="modal-title"></h2>
        <span id="modPrice" class="card-price" style="margin-bottom: 15px;"></span>
        <p id="modDesc" class="modal-desc"></p>
        
        <div class="btn-group">
            <a href="#" id="btnDemo" target="_blank" class="btn btn-outline"><i class="fas fa-play-circle"></i> Demo</a>
            <a href="#" id="btnDownload" target="_blank" class="btn btn-primary" style="display:none;"><i class="fas fa-download"></i> Download</a>
            <button id="btnBuy" class="btn btn-primary" onclick="openCheckout()" style="display:none;"><i class="fas fa-shopping-cart"></i> Buy Now</button>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div class="modal" id="checkoutModal">
        <div class="modal-drag"></div>
        <h2 class="modal-title">Complete Purchase</h2>
        <p class="modal-desc" id="checkoutProductName"></p>

        <div class="payment-card">
            <h3><i class="fas fa-wallet"></i> Send Payment To:</h3>
            <p><strong>Name:</strong> Muhammad Adnan</p>
            <p><strong>Number:</strong> 0319-4879958</p>
            <p><strong>Methods:</strong> EasyPaisa & JazzCash</p>
        </div>

        <form id="orderForm" onsubmit="submitOrder(event)">
            <div class="form-group">
                <input type="text" id="orderName" placeholder="Your Full Name" required>
            </div>
            <div class="form-group">
                <input type="tel" id="orderPhone" placeholder="Your WhatsApp/Phone Number" required>
            </div>
            <div class="form-group">
                <input type="url" id="orderScreenshot" placeholder="Payment Screenshot URL (Drive/Imgur)" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 10px;">Submit Order</button>
        </form>
    </div>

    <!-- FIREBASE INTEGRATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ==========================================
        // ⚠️ REPLACE WITH YOUR FIREBASE CONFIGURATION
        // ==========================================
       const firebaseConfig = {
  apiKey: "AIzaSyDEWP7K24CHc5Z4oigZVyLfTUf7G_ytCEA",
  authDomain: "moves-21870.firebaseapp.com",
  databaseURL: "https://moves-21870-default-rtdb.firebaseio.com",
  projectId: "moves-21870",
  storageBucket: "moves-21870.firebasestorage.app",
  messagingSenderId: "90051442745",
  appId: "1:90051442745:web:dfc38ca3afb010ca1fb5e8",
  measurementId: "G-NV6S3KFL9N"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let allProducts = {};
        let currentFilter = 'All';
        let currentProduct = null;

        // Fetch Products
        const productsRef = ref(db, 'products');
        onValue(productsRef, (snapshot) => {
            document.getElementById('loader').style.display = 'none';
            if (snapshot.exists()) {
                allProducts = snapshot.val();
                renderProducts();
            } else {
                document.getElementById('productGrid').innerHTML = '<p style="text-align:center;width:100%;grid-column:1/-1;">No products available right now.</p>';
            }
        });

        // Render Cards function
        window.renderProducts = function() {
            const grid = document.getElementById('productGrid');
            const query = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';

            let count = 0;
            for (let id in allProducts) {
                const p = allProducts[id];
                const matchCat = currentFilter === 'All' || p.category === currentFilter;
                const matchSearch = p.title.toLowerCase().includes(query);

                if (matchCat && matchSearch) {
                    count++;
                    const isFree = !p.price || parseFloat(p.price) <= 0;
                    const priceLabel = isFree ? 'Free' : `Rs. ${p.price}`;
                    const priceClass = isFree ? 'price-free' : 'price-paid';

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => window.openProduct(id);
                    card.innerHTML = `
                        <img src="${p.image}" class="card-img" alt="${p.title}" loading="lazy">
                        <div class="card-body">
                            <h3 class="card-title">${p.title}</h3>
                            <p class="card-desc">${p.shortDesc}</p>
                            <span class="card-price ${priceClass}">${priceLabel}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                }
            }
            if(count === 0) grid.innerHTML = '<p style="text-align:center;width:100%;grid-column:1/-1;color:var(--text-muted)">No items found.</p>';
        };

        // Filter Handlers
        document.getElementById('searchInput').addEventListener('input', renderProducts);
        
        window.filterCategory = function(cat, element) {
            currentFilter = cat;
            document.querySelectorAll('.cat-chip').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            renderProducts();
        };

        // Modal Handlers
        window.openProduct = function(id) {
            currentProduct = { id, ...allProducts[id] };
            document.getElementById('modImg').src = currentProduct.image;
            document.getElementById('modTitle').innerText = currentProduct.title;
            document.getElementById('modDesc').innerText = currentProduct.fullDesc || currentProduct.shortDesc;
            document.getElementById('btnDemo').href = currentProduct.demoLink || '#';
            
            const isFree = !currentProduct.price || parseFloat(currentProduct.price) <= 0;
            const priceLabel = isFree ? 'Free' : `Rs. ${currentProduct.price}`;
            const priceEl = document.getElementById('modPrice');
            priceEl.innerText = priceLabel;
            priceEl.className = 'card-price ' + (isFree ? 'price-free' : 'price-paid');

            if(isFree) {
                document.getElementById('btnBuy').style.display = 'none';
                document.getElementById('btnDownload').style.display = 'block';
                document.getElementById('btnDownload').href = currentProduct.driveLink || '#';
            } else {
                document.getElementById('btnBuy').style.display = 'block';
                document.getElementById('btnDownload').style.display = 'none';
            }

            document.getElementById('overlay').classList.add('active');
            document.getElementById('productModal').classList.add('active');
        };

        window.closeModals = function() {
            document.getElementById('overlay').classList.remove('active');
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        };

        window.openCheckout = function() {
            document.getElementById('productModal').classList.remove('active');
            document.getElementById('checkoutModal').classList.add('active');
            document.getElementById('checkoutProductName').innerText = `Purchasing: ${currentProduct.title}`;
        };

        // Order Submit Handler
        window.submitOrder = async function(e) {
            e.preventDefault();
            const btn = e.submitter;
            btn.innerText = "Submitting...";
            btn.disabled = true;

            const orderData = {
                productId: currentProduct.id,
                productName: currentProduct.title,
                price: currentProduct.price,
                customerName: document.getElementById('orderName').value,
                customerPhone: document.getElementById('orderPhone').value,
                screenshotUrl: document.getElementById('orderScreenshot').value,
                timestamp: new Date().toISOString()
            };

            try {
                await push(ref(db, 'orders'), orderData);
                alert("Order submitted successfully! Admin will verify and contact you.");
                document.getElementById('orderForm').reset();
                closeModals();
            } catch (err) {
                alert("Error submitting order: " + err.message);
            } finally {
                btn.innerText = "Submit Order";
                btn.disabled = false;
            }
        };
    </script>

    <!-- Theme Toggle JS -->
    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('themeIcon');
            if(document.body.classList.contains('light-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }
    </script>
</body>
</html>
